name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    paths-ignore:
      - '.claude/**'
      - '.github/ISSUE_TEMPLATE/**'
      - '**/*.md'
      - 'LICENSE'
    # Optional: Only run on specific file changes
    # paths:
    #   - "src/**/*.ts"
    #   - "src/**/*.tsx"
    #   - "src/**/*.js"
    #   - "src/**/*.jsx"

jobs:
  claude-review:
    # Optional: Filter by PR author
    # if: |
    #   github.event.pull_request.user.login == 'external-contributor' ||
    #   github.event.pull_request.user.login == 'new-developer' ||
    #   github.event.pull_request.author_association == 'FIRST_TIME_CONTRIBUTOR'

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Resolve outdated review threads
        if: github.event.action == 'synchronize'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          THREAD_IDS=$(gh api graphql -f query='
            query($owner: String!, $repo: String!, $number: Int!) {
              repository(owner: $owner, name: $repo) {
                pullRequest(number: $number) {
                  reviewThreads(first: 100) {
                    nodes {
                      id
                      isResolved
                      isOutdated
                      comments(first: 1) {
                        nodes {
                          author { login }
                        }
                      }
                    }
                  }
                }
              }
            }' -f owner="${{ github.repository_owner }}" \
               -f repo="${{ github.event.repository.name }}" \
               -F number=${{ github.event.pull_request.number }} \
            --jq '[.data.repository.pullRequest.reviewThreads.nodes[] | select(.isOutdated == true and .isResolved == false and .comments.nodes[0].author.login == "claude") | .id] | .[]')

          if [ -z "$THREAD_IDS" ]; then
            echo "No outdated threads to resolve"
            exit 0
          fi

          for thread_id in $THREAD_IDS; do
            gh api graphql -f query='
              mutation($threadId: ID!) {
                resolveReviewThread(input: {threadId: $threadId}) {
                  thread { isResolved }
                }
              }' -f threadId="$thread_id" || echo "::warning::Failed to resolve $thread_id"
            echo "Resolved: $thread_id"
          done

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          prompt: '/code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }} --comment'
          claude_args: '--allowedTools "Bash(gh pr diff:*)" --allowedTools "Bash(gh pr view:*)" --allowedTools "Bash(git diff:*)" --allowedTools "Bash(gh issue view:*)" --allowedTools "Bash(gh search:*)" --allowedTools "Bash(gh issue list:*)" --allowedTools "Bash(gh pr comment:*)" --allowedTools "Bash(gh pr list:*)" --allowedTools "mcp__github_inline_comment__create_inline_comment"'
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options

